  - {type: variant, offset: 21213, length: 153, content: '元久二年九月十八日書噵了書本云以興善院僧都本書了云云。

      正治二年庚申六月二十九日巳剋於超昇寺東別所書寫了執筆信西。

      同年七月十三日移點了點本寶積房書也。寫本文顯房得業本也。

      抑當年者天下飢饉人力衰微而分括命畢寫功勵微力移點噵耳志趣所之有二大願當寺伽藍造功速成興隆正法惠命長遠是一順次生中往生內院面奉彌勒心不退轉是二。

      點本云。', 甲: ''}
