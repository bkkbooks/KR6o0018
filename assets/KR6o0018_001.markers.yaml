  - {type: variant, offset: 21568, length: 84, content: '貞應元年自五月二十七日始之至六月五日九ケ日之間奉讀之了當年維摩遂講用意也　　　　　　　　大法師英弘　　聽眾良盛賴玄

      當日者是吉日也仍參上階東妻室修禪院

      遂淨名居士大職冠之御影開眼并傳受大會表白了。', 甲: 于時正德二年壬辰十一月五日於新禪院方丈以春日社西屋安置談義本奉書寫并朱點墨點如御本書之了求法沙門良聖成慶胎生二十八}
